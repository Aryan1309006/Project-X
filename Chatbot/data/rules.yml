version: "3.1"

rules:
- rule: Greet user
  steps:
  - intent: greet
  - action: utter_greet

- rule: Say goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Help
  steps:
  - intent: ask_help
  - action: utter_help

- rule: Out of scope
  steps:
  - intent: out_of_scope
  - action: utter_out_of_scope

- rule: Default fallback
  steps:
  - intent: nlu_fallback
  - action: utter_out_of_scope